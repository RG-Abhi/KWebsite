<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#f8fafc" />
  
  <!-- Subtle Technical Grid -->
  <g opacity="0.4">
    <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 0,250 L 400,250" stroke="#cbd5e1" stroke-width="0.75" />
    <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300" stroke="#cbd5e1" stroke-width="0.75" />
  </g>
  
  <!-- DNA Double Helix Wave -->
  <!-- Back Helix Strand -->
  <path d="M 60,170 Q 110,70 160,170 T 260,170 T 360,170" fill="none" stroke="#0b1f3a" stroke-width="4" opacity="0.2" />
  
  <!-- Front Helix Strand -->
  <path d="M 60,130 Q 110,230 160,130 T 260,130 T 360,130" fill="none" stroke="#fc7700" stroke-width="5" />
  
  <!-- Connecting bases -->
  <!-- Base 1 -->
  <line x1="85" y1="145" x2="85" y2="155" stroke="#f43f5e" stroke-width="3" />
  <circle cx="85" cy="145" r="4" fill="#f43f5e" />
  <circle cx="85" cy="155" r="4" fill="#f43f5e" />
  
  <!-- Base 2 (center cross) -->
  <line x1="110" y1="200" x2="110" y2="100" stroke="#0b1f3a" stroke-width="1.5" opacity="0.3" />
  <circle cx="110" cy="200" r="4" fill="#fc7700" />
  <circle cx="110" cy="100" r="4" fill="#0b1f3a" />

  <!-- Base 3 -->
  <line x1="135" y1="145" x2="135" y2="155" stroke="#10b981" stroke-width="3" />
  <circle cx="135" cy="145" r="4" fill="#10b981" />
  <circle cx="135" cy="155" r="4" fill="#10b981" />

  <!-- Base 4 -->
  <line x1="185" y1="145" x2="185" y2="155" stroke="#f43f5e" stroke-width="3" />
  <circle cx="185" cy="145" r="4" fill="#f43f5e" />
  <circle cx="185" cy="155" r="4" fill="#f43f5e" />

  <!-- Base 5 -->
  <line x1="210" y1="100" x2="210" y2="200" stroke="#0b1f3a" stroke-width="1.5" opacity="0.3" />
  <circle cx="210" cy="100" r="4" fill="#fc7700" />
  <circle cx="210" cy="200" r="4" fill="#0b1f3a" />

  <!-- Base 6 -->
  <line x1="235" y1="145" x2="235" y2="155" stroke="#10b981" stroke-width="3" />
  <circle cx="235" cy="145" r="4" fill="#10b981" />
  <circle cx="235" cy="155" r="4" fill="#10b981" />

  <!-- Base 7 -->
  <line x1="285" y1="145" x2="285" y2="155" stroke="#f43f5e" stroke-width="3" />
  <circle cx="285" cy="145" r="4" fill="#f43f5e" />
  <circle cx="285" cy="155" r="4" fill="#f43f5e" />

  <!-- Base 8 -->
  <line x1="310" y1="200" x2="310" y2="100" stroke="#0b1f3a" stroke-width="1.5" opacity="0.3" />
  <circle cx="310" cy="200" r="4" fill="#fc7700" />
  <circle cx="310" cy="100" r="4" fill="#0b1f3a" />

  <!-- Data stream vectors -->
  <circle cx="260" cy="70" r="3" fill="#0b1f3a" opacity="0.6" />
  <line x1="260" y1="70" x2="260" y2="150" stroke="#0b1f3a" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" />
  
  <circle cx="160" cy="230" r="3" fill="#fc7700" opacity="0.7" />
  <line x1="160" y1="230" x2="160" y2="150" stroke="#fc7700" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" />

  <!-- UI Code Overlay -->
  <rect x="20" y="20" width="120" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
  <text x="30" y="38" fill="#10b981" font-family="monospace" font-size="10" font-weight="bold">seq = "ATCGGTA"</text>
  <text x="30" y="52" fill="#0b1f3a" font-family="monospace" font-size="10" opacity="0.8">align(seq, ref)</text>

  <rect x="250" y="230" width="130" height="50" rx="6" fill="#ffffff" stroke="#fc7700" stroke-width="1" />
  <text x="260" y="248" fill="#fc7700" font-family="monospace" font-size="10" font-weight="bold">GENOMICS DATABASE</text>
  <text x="260" y="262" fill="#0b1f3a" font-family="monospace" font-size="10" opacity="0.8">Match: 99.8% Onco</text>
</svg>
