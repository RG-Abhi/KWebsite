<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#f8fafc" />
  
  <!-- Subtle Technical Grid -->
  <g opacity="0.4">
    <path d="M 0,50 L 400,50 M 0,100 L 400,100 M 0,150 L 400,150 M 0,200 L 400,200 M 0,250 L 400,250" stroke="#cbd5e1" stroke-width="0.75" />
    <path d="M 50,0 L 50,300 M 100,0 L 100,300 M 150,0 L 150,300 M 200,0 L 200,300 M 250,0 L 250,300 M 300,0 L 300,300 M 350,0 L 350,300" stroke="#cbd5e1" stroke-width="0.75" />
  </g>
  
  <!-- Central Hub - Smart Microprocessor -->
  <rect x="160" y="110" width="80" height="80" rx="10" fill="#ffffff" stroke="#0b1f3a" stroke-width="3" />
  <rect x="175" y="125" width="50" height="50" rx="6" fill="#f8fafc" stroke="#fc7700" stroke-width="2" />
  <text x="182" y="154" fill="#fc7700" font-family="sans-serif" font-size="12" font-weight="bold">KMIT</text>
  
  <!-- Chip Pins -->
  <!-- Left Pins -->
  <line x1="145" y1="130" x2="160" y2="130" stroke="#0b1f3a" stroke-width="3" />
  <line x1="145" y1="150" x2="160" y2="150" stroke="#0b1f3a" stroke-width="3" />
  <line x1="145" y1="170" x2="160" y2="170" stroke="#0b1f3a" stroke-width="3" />
  
  <!-- Right Pins -->
  <line x1="240" y1="130" x2="255" y2="130" stroke="#0b1f3a" stroke-width="3" />
  <line x1="240" y1="150" x2="255" y2="150" stroke="#0b1f3a" stroke-width="3" />
  <line x1="240" y1="170" x2="255" y2="170" stroke="#0b1f3a" stroke-width="3" />

  <!-- Top Pins -->
  <line x1="180" y1="95" x2="180" y2="110" stroke="#0b1f3a" stroke-width="3" />
  <line x1="200" y1="95" x2="200" y2="110" stroke="#0b1f3a" stroke-width="3" />
  <line x1="220" y1="95" x2="220" y2="110" stroke="#0b1f3a" stroke-width="3" />

  <!-- Bottom Pins -->
  <line x1="180" y1="190" x2="180" y2="205" stroke="#0b1f3a" stroke-width="3" />
  <line x1="200" y1="190" x2="200" y2="205" stroke="#0b1f3a" stroke-width="3" />
  <line x1="220" y1="190" x2="220" y2="205" stroke="#0b1f3a" stroke-width="3" />

  <!-- Connected Smart IoT Sensor Nodes -->
  <!-- Node 1: Temperature Sensor -->
  <circle cx="90" cy="70" r="30" fill="#ffffff" stroke="#0b1f3a" stroke-width="2" />
  <path d="M 90,60 L 90,75 M 86,75 A 5,5 0 1,0 94,75" stroke="#0b1f3a" stroke-width="2" fill="none" />
  <line x1="120" y1="85" x2="160" y2="120" stroke="#0b1f3a" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" />
  
  <!-- Node 2: Actuator/Motor/Robot -->
  <circle cx="310" cy="70" r="30" fill="#ffffff" stroke="#fc7700" stroke-width="2" />
  <rect x="298" y="60" width="24" height="16" rx="3" fill="none" stroke="#fc7700" stroke-width="2" />
  <circle cx="304" cy="68" r="2" fill="#fc7700" />
  <circle cx="316" cy="68" r="2" fill="#fc7700" />
  <line x1="310" y1="52" x2="310" y2="60" stroke="#fc7700" stroke-width="1.5" />
  <line x1="280" y1="85" x2="240" y2="120" stroke="#fc7700" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" />

  <!-- Node 3: Wi-Fi Signal -->
  <circle cx="90" cy="220" r="30" fill="#ffffff" stroke="#fc7700" stroke-width="2" />
  <path d="M 80,210 A 15,15 0 0,1 100,210 M 75,205 A 22,22 0 0,1 105,205 M 87,218 A 4,4 0 1,1 93,218" stroke="#fc7700" stroke-width="2" fill="none" />
  <line x1="120" y1="205" x2="160" y2="175" stroke="#fc7700" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" />

  <!-- Node 4: Robotic Arm/Gripper -->
  <circle cx="310" cy="220" r="30" fill="#ffffff" stroke="#0b1f3a" stroke-width="2" />
  <path d="M 300,230 L 310,215 L 320,230 M 310,215 L 310,200" stroke="#0b1f3a" stroke-width="2.5" fill="none" />
  <line x1="280" y1="205" x2="240" y2="175" stroke="#0b1f3a" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" />

  <!-- UI Status -->
  <text x="30" y="275" fill="#0b1f3a" font-family="monospace" font-size="11" font-weight="bold" opacity="0.6">NODE COUNT: 32 active</text>
  <text x="260" y="275" fill="#fc7700" font-family="monospace" font-size="11" font-weight="bold" opacity="0.9">SYSTEM: ONLINE</text>
</svg>
